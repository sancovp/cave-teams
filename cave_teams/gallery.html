<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cave-teams · live team</title>
<style>
  :root {
    --bg:#0f1014; --panel:#16181f; --panel2:#1c1f28; --border:#2a2e3a;
    --text:#e8e8ec; --muted:#9a9ca6; --accent:#6ea8fe; --gold:#f0b429;
    --green:#5dd39e; --red:#f4677a;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; line-height:1.5; }
  .mono { font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace; }
  header { display:flex; align-items:center; gap:14px; padding:12px 20px;
    background:color-mix(in srgb,var(--bg) 82%,transparent); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; height:56px; }
  header .logo { font-weight:800; letter-spacing:-.02em; }
  header .grad { background:linear-gradient(90deg,var(--accent),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  header .task { color:var(--muted); font-size:13px; max-width:46ch; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  header #status { margin-left:auto; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  #status .dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
  #status.live .dot { animation:pulse 1.2s infinite; }
  #status.done .dot { background:var(--accent); }
  @keyframes pulse { 50%{opacity:.3;} }

  .app { display:grid; grid-template-columns:1fr 320px; min-height:calc(100vh - 56px); }
  .stage { padding:16px 20px; min-width:0; }
  .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .toolbar .hint { color:var(--muted); font-size:12px; }
  .btn { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); border-radius:9px; padding:7px 13px; font-size:13px;
    cursor:pointer; user-select:none; }
  .btn:hover { border-color:color-mix(in srgb,var(--accent) 45%,var(--border)); }
  body.unlocked .btn.lock { border-color:var(--gold); color:var(--gold); }

  #graph { width:100%; height:300px; display:block; margin:0 0 14px; }
  #graph .edge { stroke:var(--border); stroke-width:1.5; opacity:.45; transition:stroke .2s,opacity .2s; }
  #graph .edge.active { stroke:var(--gold); stroke-width:2.5; opacity:1; filter:url(#glow); }
  #graph .gnode { cursor:pointer; }
  #graph .gnode .disc { fill:var(--panel); stroke:var(--c,var(--accent)); stroke-width:2; transition:filter .2s,stroke .2s; }
  #graph .gnode.leader .disc { stroke:var(--gold); }
  #graph .gnode.working .disc { stroke:var(--gold); }
  #graph .gnode.glow .disc { filter:url(#glow); }
  #graph .gnode .halo { fill:var(--c,var(--accent)); opacity:0; transition:opacity .3s; }
  #graph .gnode.glow .halo { opacity:.16; }
  #graph .gnode .emo { font-size:20px; }
  #graph .gnode .nm { fill:var(--text); font-size:13px; font-weight:700; }
  #graph .gnode .ro { fill:var(--muted); font-size:9.5px; letter-spacing:.12em; }
  #graph .pulse { fill:#fff; filter:url(#glow); }
  .tile.focus { box-shadow:0 0 0 2px var(--accent), 0 12px 44px -16px var(--accent); }
  #bento { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; align-items:start; }
  .tile { position:relative; border:1px solid var(--border); border-top:3px solid var(--c,var(--accent));
    background:var(--panel); border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:9px;
    transition:box-shadow .2s, transform .12s; }
  .tile.working { box-shadow:0 0 0 1px color-mix(in srgb,var(--c,var(--accent)) 45%,transparent),
    0 8px 30px -16px color-mix(in srgb,var(--c,var(--accent)) 60%,transparent); }
  .tile.flash { animation:flash .9s ease; }
  @keyframes flash { 0%{ box-shadow:0 0 0 2px var(--gold); } 100%{} }
  body.unlocked .tile { cursor:grab; }
  body.unlocked .tile.drag { opacity:.5; }
  .tile-hd { display:flex; align-items:center; gap:10px; }
  .tile .emoji { font-size:22px; line-height:1; width:34px; height:34px; display:grid; place-items:center;
    border-radius:9px; background:color-mix(in srgb,var(--c,var(--accent)) 14%,var(--panel)); border:none; }
  .tile .who { display:flex; flex-direction:column; min-width:0; }
  .tile .who b { color:var(--c,var(--accent)); letter-spacing:-.01em; }
  .tile .who .role { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .tile .st { margin-left:auto; font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .tile .st i { width:8px; height:8px; border-radius:50%; background:#3b3f4c; display:inline-block; }
  .tile.working .st i { background:var(--gold); animation:pulse 1s infinite; }
  .tile.done .st i { background:var(--green); }
  .tile .line { font-size:12.5px; }
  .tile .line .k { color:var(--muted); }
  .tile .status1 { font-size:13px; color:var(--text); }
  .tile .last { font-size:12px; color:var(--muted); border-left:2px solid var(--border); padding-left:9px; }
  .tile .last .txt { color:var(--text); display:block; margin-top:2px; white-space:pre-wrap; word-break:break-word;
    max-height:4.6em; overflow:hidden; }
  .tile .resp { font-size:12.5px; color:var(--text); background:color-mix(in srgb,var(--green) 7%,var(--panel));
    border-radius:9px; padding:8px 10px; white-space:pre-wrap; word-break:break-word; max-height:7em; overflow:auto; }
  .tile .swatch { width:18px; height:18px; border-radius:50%; border:2px solid var(--border);
    background:var(--c,var(--accent)); cursor:pointer; padding:0; }
  .pop { position:absolute; top:52px; left:14px; z-index:20; background:var(--panel2);
    border:1px solid var(--border); border-radius:11px; padding:8px; display:none;
    grid-template-columns:repeat(6,1fr); gap:5px; box-shadow:0 16px 44px -12px #000; }
  .pop.open { display:grid; }
  .pop .opt { cursor:pointer; border-radius:7px; width:28px; height:28px; display:grid; place-items:center;
    font-size:16px; border:1px solid transparent; }
  .pop .opt:hover { border-color:var(--accent); background:var(--panel); }
  .pop .sw { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .pop .sw.on { border-color:var(--text); }

  .rail { border-left:1px solid var(--border); background:var(--panel); position:sticky; top:56px;
    height:calc(100vh - 56px); overflow:auto; display:flex; flex-direction:column; }
  .rail h3 { margin:0; padding:13px 16px; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); }
  #log { padding:10px 14px; display:flex; flex-direction:column; gap:8px; }
  .li { font-size:12.5px; display:grid; grid-template-columns:auto 1fr; gap:8px; animation:slide .25s ease; }
  @keyframes slide { from{opacity:0; transform:translateY(-4px);} }
  .li .t { color:var(--muted); font-variant-numeric:tabular-nums; font-size:11px; padding-top:1px; }
  .li b { color:var(--accent); } .li .g { color:var(--green); }
  .li.warn { color:var(--gold); } .li.warn b { color:var(--gold); }
  .li.report { color:var(--accent); }
  @media (max-width:820px){ .app{ grid-template-columns:1fr; } .rail{ position:static; height:auto;
    border-left:none; border-top:1px solid var(--border); } }
</style>
</head>
<body>
<header>
  <span class="logo">cave<span class="grad">·teams</span></span>
  <span class="task" id="task"></span>
  <span id="status" class="live"><span class="dot"></span><span id="statusText">live</span></span>
</header>

<div class="app">
  <div class="stage">
    <div class="toolbar">
      <button class="btn lock" id="lockBtn" onclick="toggleLock()">🔒 locked</button>
      <span class="hint" id="hint">a tile per agent — its task, status, last message in, and latest response</span>
    </div>
    <svg id="graph" viewBox="0 0 800 300" preserveAspectRatio="xMidYMid meet">
      <defs><filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter></defs>
    </svg>
    <div id="bento"></div>
  </div>
  <aside class="rail">
    <h3>live log</h3>
    <div id="log"></div>
  </aside>
</div>

<script>
const bento = document.getElementById('bento');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const taskEl = document.getElementById('task');

const EMOJIS = ['🧭','🔬','✍️','🛠️','📊','🔎','🧠','⚙️','📦','🎯','🤖','🦉'];
const COLORS = ['#6ea8fe','#5dd39e','#f0b429','#b794f6','#f4677a','#4fd1c5','#f6995c','#9aa0ff'];
const DEF_EMOJI = {leader:'🧭'};
const agents = {};   // name -> {role, el, color, emoji, ...}
let order = JSON.parse(localStorage.getItem('ct:order') || '[]');

const LS = (a,k) => localStorage.getItem(`ct:${a}:${k}`);
const setLS = (a,k,v) => localStorage.setItem(`ct:${a}:${k}`, v);
function closeAllPops(){ document.querySelectorAll('.pop.open').forEach(p=>p.classList.remove('open')); }
document.addEventListener('click', closeAllPops);   // click anywhere outside closes palettes

function now() { const d=new Date(); return d.toTimeString().slice(0,8); }

function defColor(role, idx){ return role==='leader' ? '#f0b429' : COLORS[(idx)%COLORS.length]; }
function defEmoji(role, idx){ return DEF_EMOJI[role] || EMOJIS[1 + (idx % (EMOJIS.length-1))]; }

function tile(name, role) {
  if (agents[name]) return agents[name];
  const idx = Object.keys(agents).length;
  const a = { name, role, color: LS(name,'color') || defColor(role, idx),
              emoji: LS(name,'emoji') || defEmoji(role, idx),
              status:'idle', task:'', status1:'waiting', last:null, resp:'' };
  const el = document.createElement('div');
  el.className = 'tile'; el.dataset.agent = name; el.style.setProperty('--c', a.color);
  el.innerHTML = `
    <div class="tile-hd">
      <button class="emoji" title="click to change emoji">${a.emoji}</button>
      <button class="swatch" title="click to change colour"></button>
      <div class="who"><b>${name}</b><span class="role">${role}</span></div>
      <span class="st"><i></i><span class="stt">idle</span></span>
    </div>
    <div class="pop emojipop">${EMOJIS.map(e=>`<span class="opt" data-emoji="${e}">${e}</span>`).join('')}</div>
    <div class="pop colorpop">${COLORS.map(c=>`<span class="sw" data-color="${c}" style="background:${c}"></span>`).join('')}</div>
    <div class="line task"><span class="k">task:</span> <span class="v">—</span></div>
    <div class="status1">waiting</div>
    <div class="last" hidden></div>
    <div class="resp" hidden></div>`;
  a.el = el;
  // drag to rearrange (when unlocked)
  el.draggable = false;
  el.addEventListener('dragstart', e => { dragged = el; el.classList.add('drag'); });
  el.addEventListener('dragend', () => { el.classList.remove('drag'); saveOrder(); });
  el.addEventListener('dragover', e => { e.preventDefault();
    const t = e.currentTarget; if (dragged && dragged!==t) {
      const r = t.getBoundingClientRect();
      bento.insertBefore(dragged, (e.clientY - r.top)/r.height < .5 ? t : t.nextSibling);
    } });
  // click-to-open palettes: emoji button → emoji palette · swatch → colour palette
  const emojipop = el.querySelector('.emojipop'), colorpop = el.querySelector('.colorpop');
  el.querySelector('.emoji').onclick = (e) => { e.stopPropagation(); const was = emojipop.classList.contains('open'); closeAllPops(); if (!was) emojipop.classList.add('open'); };
  el.querySelector('.swatch').onclick = (e) => { e.stopPropagation(); const was = colorpop.classList.contains('open'); closeAllPops(); if (!was) colorpop.classList.add('open'); };
  emojipop.querySelectorAll('.opt').forEach(o => o.onclick = (e) => { e.stopPropagation();
    a.emoji = o.dataset.emoji; el.querySelector('.emoji').textContent = a.emoji; setLS(name,'emoji',a.emoji); emojipop.classList.remove('open'); });
  colorpop.querySelectorAll('.sw').forEach(s => { if (s.dataset.color===a.color) s.classList.add('on');
    s.onclick = (e) => { e.stopPropagation(); a.color=s.dataset.color; el.style.setProperty('--c',a.color); setLS(name,'color',a.color);
      colorpop.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on', x===s)); colorpop.classList.remove('open'); }; });
  bento.appendChild(el);
  agents[name] = a;
  return a;
}

function render(a) {
  const el = a.el;
  el.classList.toggle('working', a.status==='working');
  el.classList.toggle('done', a.status==='done');
  el.querySelector('.stt').textContent = a.status;
  el.querySelector('.task .v').textContent = a.task || '—';
  el.querySelector('.status1').textContent = a.status1;
  const last = el.querySelector('.last');
  if (a.last) { last.hidden = false;
    last.innerHTML = `← from <b style="color:var(--c)">${a.last.from}</b> · ${a.last.when}<span class="txt"></span>`;
    last.querySelector('.txt').textContent = a.last.text; }
  const resp = el.querySelector('.resp');
  if (a.resp) { resp.hidden = false; resp.textContent = '→ ' + a.resp; }
}

function log(cls, t, html) {
  const li = document.createElement('div'); li.className = 'li ' + (cls||'');
  li.innerHTML = `<span class="t">${t}</span><span class="m">${html}</span>`;
  logEl.appendChild(li); li.scrollIntoView({behavior:'smooth', block:'end'});
}

// ── the team GRAPH: leader on top, teammates below; edges = allowed paths; pulses light up on events ──
const NS = 'http://www.w3.org/2000/svg';
const G = { svg: document.getElementById('graph'), nodes: {} };
function leaderName(){ return Object.keys(G.nodes).find(k => G.nodes[k].role === 'leader'); }
function buildGraph(leader, members) {
  [...G.svg.querySelectorAll('.gnode,.edge,.pulse')].forEach(e => e.remove());
  G.nodes = { [leader]: { x:400, y:64, role:'leader' } };
  const n = members.length;
  members.forEach((m,i) => { const x = n===1 ? 400 : (150 + i*(500/(n-1))); G.nodes[m] = { x, y:228, role:'teammate' }; });
  // allowed edges: leader <-> each teammate (every message routes through the leader/dovetail)
  members.forEach(m => {
    const a=G.nodes[leader], b=G.nodes[m];
    const e = document.createElementNS(NS,'line');
    e.setAttribute('x1',a.x); e.setAttribute('y1',a.y+24); e.setAttribute('x2',b.x); e.setAttribute('y2',b.y-24);
    e.setAttribute('class','edge'); G.svg.appendChild(e); b.edge = e;
  });
  // nodes on top of the edges
  Object.entries(G.nodes).forEach(([name,nd]) => {
    const ag = agents[name] || { emoji: nd.role==='leader'?'🧭':'🤖', color: nd.role==='leader'?'#f0b429':'#6ea8fe' };
    const g = document.createElementNS(NS,'g'); g.setAttribute('class','gnode '+nd.role); g.dataset.agent=name;
    g.setAttribute('transform',`translate(${nd.x},${nd.y})`); g.style.setProperty('--c', ag.color);
    g.innerHTML = `<circle class="halo" r="30"/><circle class="disc" r="24"/>`
      + `<text class="emo" y="7" text-anchor="middle">${ag.emoji}</text>`
      + `<text class="nm" y="46" text-anchor="middle">${name}</text>`
      + `<text class="ro" y="61" text-anchor="middle">${nd.role.toUpperCase()}</text>`;
    g.onclick = () => focusAgent(name);
    G.svg.appendChild(g); nd.g = g;
  });
}
function pulseEdge(from, to) {
  const a=G.nodes[from], b=G.nodes[to]; if(!a||!b) return;
  const edge = (a.role === 'leader') ? b.edge : a.edge;
  if (edge) { edge.classList.add('active'); setTimeout(()=>edge.classList.remove('active'), 1600); }
  const p = document.createElementNS(NS,'circle'); p.setAttribute('class','pulse'); p.setAttribute('r','5'); G.svg.appendChild(p);
  const t0 = performance.now(), dur = 1100;
  (function step(now){ const k=Math.min(1,(now-t0)/dur);
    p.setAttribute('cx', a.x+(b.x-a.x)*k); p.setAttribute('cy', a.y+(b.y-a.y)*k);
    if(k<1) requestAnimationFrame(step); else p.remove(); })(t0);
  [a.g,b.g].forEach(g => { if(g){ g.classList.add('glow'); setTimeout(()=>g.classList.remove('glow'),1600); } });
}
function gStatus(name, working){ const nd=G.nodes[name]; if(nd&&nd.g) nd.g.classList.toggle('working', !!working); }
function gGlow(name){ const nd=G.nodes[name]; if(nd&&nd.g){ nd.g.classList.add('glow'); setTimeout(()=>nd.g.classList.remove('glow'),1600); } }
function focusAgent(name){ const t = agents[name] && agents[name].el; if(!t) return;
  document.querySelectorAll('.tile.focus').forEach(x=>x.classList.remove('focus'));
  t.classList.add('focus'); t.scrollIntoView({behavior:'smooth', block:'center'}); setTimeout(()=>t.classList.remove('focus'), 2600); }

function applyOrder() {
  order.forEach(n => { if (agents[n]) bento.appendChild(agents[n].el); });
}
function saveOrder() {
  order = [...bento.children].map(t => t.dataset.agent);
  localStorage.setItem('ct:order', JSON.stringify(order));
}

let unlocked = false, dragged = null;
function toggleLock() {
  unlocked = !unlocked;
  document.body.classList.toggle('unlocked', unlocked);
  Object.values(agents).forEach(a => a.el.draggable = unlocked);
  document.getElementById('lockBtn').textContent = unlocked ? '🔓 unlocked — drag to rearrange' : '🔒 locked';
  document.getElementById('hint').textContent = unlocked
    ? 'drag tiles to rearrange · click the emoji + a colour to customise each agent'
    : 'a tile per agent — its task, status, last message in, and latest response';
}

function handle(ev) {
  const d = ev.data || ev;
  if (ev.kind === 'team') {
    taskEl.textContent = d.task ? '— ' + d.task : '';
    tile(d.leader, 'leader'); const L = agents[d.leader]; L.task = d.task || ''; L.status1 = 'orchestrating'; render(L);
    (d.members || []).forEach(m => tile(m, 'teammate'));
    applyOrder();
    buildGraph(d.leader, d.members || []);
  } else if (ev.kind === 'dispatch') {
    const a = tile(d.to, 'teammate');
    a.status = 'working'; a.task = d.prompt || a.task;
    a.status1 = d.one_liner_to_show_user || ('working — ' + (d.prompt || '').slice(0,60));
    a.last = { from:'leader', when:now(), text:d.prompt || ('read ' + (d.path||'')) };
    render(a);
    pulseEdge(leaderName(), d.to); gStatus(d.to, true);
    log('', now(), `<b>leader</b> → <b style="color:var(--c)">${d.to}</b>`);
  } else if (ev.kind === 'blocked') {
    const L = Object.values(agents).find(a=>a.role==='leader'); if (L) { L.el.classList.remove('flash'); void L.el.offsetWidth; L.el.classList.add('flash'); L.status1='corrected a wrong message'; render(L); }
    gGlow(leaderName());
    log('warn', now(), `⚠ guardrail blocked the leader — ${(d.error||'').slice(0,70)}`);
  } else if (ev.kind === 'response') {
    const a = tile(d.frm, 'teammate');
    a.status = 'done'; a.status1 = d.one_liner_to_show_user || 'responded'; a.resp = d.text || ''; render(a);
    pulseEdge(d.frm, leaderName()); gStatus(d.frm, false);
    log('', now(), `<span class="g">${d.frm}</span> → leader ✓`);
  } else if (ev.kind === 'report') {
    statusEl.className = 'done'; statusText.textContent = 'done';
    const L = Object.values(agents).find(a=>a.role==='leader'); if (L) { L.status='done'; L.status1='run complete — report ready'; render(L); }
    log('report', now(), `✓ team report ready`);
  }
}

// LIVE via the cave server's SSE, or DEMO from an embedded run (for capture / standalone view).
const DEMO = [
  {kind:'team', data:{leader:'leader', members:['researcher','writer'], task:'Why are octopuses considered intelligent?'}},
  {kind:'dispatch', data:{to:'researcher', prompt:'read the task and give 3 key facts', path:'sessions/s1/task.txt', one_liner_to_show_user:'Researching octopus intelligence — gathering 3 key facts'}},
  {kind:'response', data:{frm:'researcher', text:'• distributed nervous system (9 brains)\n• tool use & problem-solving (jars, mazes)\n• camouflage requires real-time scene modeling', one_liner_to_show_user:'Found 3 facts: 9-brain system, tool use, real-time camouflage'}},
  {kind:'blocked', data:{error:"It isn't researcher's turn — these can run now: ['writer']. Message one of them."}},
  {kind:'dispatch', data:{to:'writer', prompt:'read the research and write one tight sentence', path:'sessions/s1/artifacts/researcher-response.txt', one_liner_to_show_user:'Writing the final one-sentence summary from the research'}},
  {kind:'response', data:{frm:'writer', text:'Octopuses are intelligent because a distributed nine-brain nervous system lets them solve problems, use tools, and model their surroundings in real time to camouflage.', one_liner_to_show_user:'Wrote the final summary sentence'}},
  {kind:'report', data:{text:'researcher gathered the facts; the leader caught itself re-dispatching researcher and corrected to the writer; the writer produced the final sentence.'}},
];

function runDemo(seq, i=0) {
  if (i >= seq.length) { statusEl.className='done'; statusText.textContent='done'; return; }
  handle(seq[i]);
  setTimeout(() => runDemo(seq, i+1), seq[i].kind === 'response' ? 1000 : 700);
}

const params = new URLSearchParams(location.search);
if (params.get('live') !== null) {
  try {
    const es = new EventSource('/team/events');
    es.onmessage = (m) => { try { handle(JSON.parse(m.data)); } catch (e) {} };
    es.onerror = () => { statusText.textContent = 'disconnected'; };
  } catch (e) { statusText.textContent = 'no stream'; runDemo(DEMO); }
} else {
  statusText.textContent = 'replay';
  runDemo(DEMO);
}
</script>
</body>
</html>
