<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
<title>cave-teams · live team</title>
<style>
  :root {
    --bg:#0b0c10; --panel:#16181f; --panel2:#1c1f28; --border:#2a2e3a;
    --text:#e8e8ec; --muted:#9a9ca6; --accent:#6ea8fe; --gold:#f0b429;
    --green:#5dd39e; --red:#f4677a;
  }
  * { box-sizing:border-box; }
  body { margin:0; color:var(--text); line-height:1.5;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(1100px 520px at 12% -8%, rgba(240,180,41,.075), transparent 62%),
      radial-gradient(950px 640px at 88% 112%, rgba(110,168,254,.085), transparent 62%),
      var(--bg); }
  .mono { font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace; }

  /* ambient dust canvas sits under everything (draw loop skips the blurred header region) */
  #dust { position:fixed; inset:0; z-index:0; pointer-events:none; }
  header, .app { position:relative; z-index:1; }

  header { display:flex; align-items:center; gap:14px; padding:12px 20px;
    background:color-mix(in srgb,var(--bg) 80%,transparent); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; height:56px; }
  header .logo { font-weight:800; letter-spacing:-.02em; }
  header .grad { background:linear-gradient(90deg,var(--accent),var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  body.celebrate header .grad { background:linear-gradient(90deg,var(--gold),#ffe9b0,var(--gold));
    background-size:200% 100%; -webkit-background-clip:text; background-clip:text;
    animation:shimmer 2.2s linear infinite; }
  @keyframes shimmer { to { background-position:-200% 0; } }
  header .task { color:var(--muted); font-size:13px; max-width:46ch; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  header #clock { margin-left:auto; font-size:12px; color:var(--gold); font-variant-numeric:tabular-nums; }
  header #status { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  #status .dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
  #status.live .dot { animation:pulse 1.2s infinite; }
  #status.done .dot { background:var(--accent); }
  @keyframes pulse { 50%{opacity:.3;} }

  .app { display:grid; grid-template-columns:1fr 320px; min-height:calc(100vh - 56px); }
  .stage { padding:16px 20px; min-width:0; }
  .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar .hint { color:var(--muted); font-size:12px; }
  .btn { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); border-radius:9px; padding:7px 13px; font-size:13px;
    cursor:pointer; user-select:none; }
  .btn:hover { border-color:color-mix(in srgb,var(--accent) 45%,var(--border)); }
  body.unlocked .btn.lock { border-color:var(--gold); color:var(--gold); }

  /* ── the team graph ── */
  #graph { width:100%; height:330px; display:block; margin:0 0 14px; }
  #graph .edge { fill:none; stroke:var(--border); stroke-width:1.6; opacity:.38; }
  #graph .edge.active { stroke:var(--gold); stroke-width:2.4; opacity:1; filter:url(#glow);
    stroke-dasharray:7 9; animation:dashflow .5s linear infinite; }
  @keyframes dashflow { to { stroke-dashoffset:-32; } }
  #graph .gnode { cursor:pointer; }
  #graph .gnode .halo { fill:var(--c,var(--accent)); opacity:0; transition:opacity .3s; }
  #graph .gnode.glow .halo { opacity:.15; }
  #graph .gnode .ring { fill:none; stroke:color-mix(in srgb,var(--c,var(--accent)) 32%,transparent); stroke-width:1; }
  #graph .gnode .disc { fill:var(--panel); stroke:var(--c,var(--accent)); stroke-width:2; transition:stroke .2s; }
  #graph .gnode.leader .disc { stroke:var(--gold); }
  #graph .gnode.glow .disc { filter:url(#glow); }
  #graph .gnode .spinring { fill:none; stroke:var(--gold); stroke-width:2; stroke-dasharray:34 142;
    stroke-linecap:round; opacity:0; transform-box:fill-box; transform-origin:center; }
  #graph .gnode.working .spinring { opacity:1; animation:spin 1.1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #graph .gnode .donedot { fill:var(--green); stroke:var(--bg); stroke-width:1.5; opacity:0; transition:opacity .3s; }
  #graph .gnode.done .donedot { opacity:1; }
  #graph .gnode .emo { font-size:20px; }
  #graph .gnode .nm { fill:var(--text); font-size:13px; font-weight:700; }
  #graph .gnode .ro { fill:var(--muted); font-size:9.5px; letter-spacing:.12em; }
  #graph .pulse { fill:#fff; filter:url(#glow); }
  #graph .trail { fill:var(--gold); }

  /* ── the final report ── */
  #reportCard { border:1px solid color-mix(in srgb,var(--gold) 45%,var(--border));
    background:color-mix(in srgb,var(--gold) 6%,var(--panel));
    border-radius:14px; padding:14px 16px; margin:0 0 14px; animation:pop .4s ease; }
  #reportCard .rc-hd { font-size:11px; letter-spacing:.12em; color:var(--gold); font-weight:800; margin-bottom:6px; }
  #reportCard .rc-body { font-size:13.5px; white-space:pre-wrap; word-break:break-word; }
  @keyframes pop { from { opacity:0; transform:translateY(6px) scale(.98); } }

  /* ── the bento tiles ── */
  .tile.focus { box-shadow:0 0 0 2px var(--accent), 0 12px 44px -16px var(--accent); }
  #bento { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; align-items:start; }
  .tile { position:relative; border:1px solid var(--border); border-top:3px solid var(--c,var(--accent));
    background:var(--panel); border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:9px;
    transition:box-shadow .2s, transform .12s; animation:pop .35s ease; }
  .tile.working { box-shadow:0 0 0 1px color-mix(in srgb,var(--c,var(--accent)) 45%,transparent),
    0 8px 30px -16px color-mix(in srgb,var(--c,var(--accent)) 60%,transparent); }
  .tile.working::after { content:""; position:absolute; inset:-1px; border-radius:14px; pointer-events:none;
    background:linear-gradient(120deg, transparent 30%,
      color-mix(in srgb,var(--c,var(--accent)) 18%,transparent) 50%, transparent 70%);
    background-size:220% 100%; animation:sheen 1.8s linear infinite; }
  @keyframes sheen { from{background-position:150% 0;} to{background-position:-70% 0;} }
  .tile.flash { animation:flash .9s ease; }
  @keyframes flash { 0%{ box-shadow:0 0 0 2px var(--gold); } 100%{} }
  body.unlocked .tile { cursor:grab; }
  body.unlocked .tile.drag { opacity:.5; }
  .tile-hd { display:flex; align-items:center; gap:10px; }
  .tile .emoji { font-size:22px; line-height:1; width:34px; height:34px; display:grid; place-items:center;
    border-radius:9px; background:color-mix(in srgb,var(--c,var(--accent)) 14%,var(--panel)); border:none; cursor:pointer; }
  .tile .who { display:flex; flex-direction:column; min-width:0; }
  .tile .who b { color:var(--c,var(--accent)); letter-spacing:-.01em; }
  .tile .who .role { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .tile .st { margin-left:auto; font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .tile .st i { width:8px; height:8px; border-radius:50%; background:#3b3f4c; display:inline-block; }
  .tile .st .tm { color:var(--gold); font-variant-numeric:tabular-nums; }
  .tile.done .st .tm { color:var(--muted); }
  .tile.working .st i { background:var(--gold); animation:pulse 1s infinite; }
  .tile.done .st i { background:var(--green); }
  .tile .line { font-size:12.5px; }
  .tile .line .k { color:var(--muted); }
  .tile .status1 { font-size:13px; color:var(--text); }
  .tile .last { font-size:12px; color:var(--muted); border-left:2px solid var(--border); padding-left:9px; }
  .tile .last .txt { color:var(--text); display:block; margin-top:2px; white-space:pre-wrap; word-break:break-word;
    max-height:4.6em; overflow:hidden; }
  .tile .resp { font-size:12.5px; color:var(--text); background:color-mix(in srgb,var(--green) 7%,var(--panel));
    border-radius:9px; padding:8px 10px; white-space:pre-wrap; word-break:break-word; max-height:7em; overflow:auto; }
  .tile .swatch { width:18px; height:18px; border-radius:50%; border:2px solid var(--border);
    background:var(--c,var(--accent)); cursor:pointer; padding:0; }
  .pop { position:absolute; top:52px; left:14px; z-index:20; background:var(--panel2);
    border:1px solid var(--border); border-radius:11px; padding:8px; display:none;
    grid-template-columns:repeat(6,1fr); gap:5px; box-shadow:0 16px 44px -12px #000; }
  .pop.open { display:grid; }
  .pop .opt { cursor:pointer; border-radius:7px; width:28px; height:28px; display:grid; place-items:center;
    font-size:16px; border:1px solid transparent; }
  .pop .opt:hover { border-color:var(--accent); background:var(--panel); }
  .pop .sw { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
  .pop .sw.on { border-color:var(--text); }

  /* ── the live-log rail ── */
  .rail { border-left:1px solid var(--border); background:var(--panel); position:sticky; top:56px;
    height:calc(100vh - 56px); overflow:auto; display:flex; flex-direction:column; }
  .rail h3 { margin:0; padding:13px 16px; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); z-index:2; }
  #log { padding:10px 14px; display:flex; flex-direction:column; gap:8px; }
  .li { font-size:12.5px; display:grid; grid-template-columns:auto 1fr; gap:8px; animation:slide .25s ease; }
  @keyframes slide { from{opacity:0; transform:translateY(-4px);} }
  .li .t { color:var(--muted); font-variant-numeric:tabular-nums; font-size:11px; padding-top:1px; }
  .li b { color:var(--accent); } .li .g { color:var(--green); }
  .li.warn { color:var(--gold); } .li.warn b { color:var(--gold); }
  .li.report { color:var(--accent); }
  @media (max-width:820px){ .app{ grid-template-columns:1fr; } .rail{ position:static; height:auto;
    border-left:none; border-top:1px solid var(--border); } }
</style>
</head>
<body>
<canvas id="dust"></canvas>
<header>
  <span class="logo">cave<span class="grad">·teams</span></span>
  <span class="task" id="task"></span>
  <span id="clock"></span>
  <span id="status" class="live"><span class="dot"></span><span id="statusText">live</span></span>
</header>

<div class="app">
  <div class="stage">
    <div class="toolbar">
      <button class="btn lock" id="lockBtn" onclick="toggleLock()">🔒 locked</button>
      <button class="btn" id="sndBtn" title="procedural event sounds"></button>
      <span class="hint" id="hint">a tile per agent — its task, status, last message in, and latest response</span>
    </div>
    <svg id="graph" viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet">
      <defs><filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter></defs>
    </svg>
    <div id="reportCard" hidden>
      <div class="rc-hd">✓ TEAM REPORT</div>
      <div class="rc-body" id="reportText"></div>
    </div>
    <div id="bento"></div>
  </div>
  <aside class="rail">
    <h3>live log</h3>
    <div id="log"></div>
  </aside>
</div>

<script>
const bento = document.getElementById('bento');
const railEl = document.querySelector('.rail');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const taskEl = document.getElementById('task');
const clockEl = document.getElementById('clock');
const reportCard = document.getElementById('reportCard');
const reportText = document.getElementById('reportText');

const EMOJIS = ['🧭','🔬','✍️','🛠️','📊','🔎','🧠','⚙️','📦','🎯','🤖','🦉'];
const COLORS = ['#6ea8fe','#5dd39e','#f0b429','#b794f6','#f4677a','#4fd1c5','#f6995c','#9aa0ff'];
const DEF_EMOJI = {leader:'🧭'};
const agents = {};   // name -> {role, el, color, emoji, ...}
let order = JSON.parse(localStorage.getItem('ct:order') || '[]');
let runT0 = null, runDone = false;

const LS = (a,k) => localStorage.getItem(`ct:${a}:${k}`);
const setLS = (a,k,v) => localStorage.setItem(`ct:${a}:${k}`, v);
function closeAllPops(){ document.querySelectorAll('.pop.open').forEach(p=>p.classList.remove('open')); }
document.addEventListener('click', closeAllPops);   // click anywhere outside closes palettes

function now() { const d=new Date(); return d.toTimeString().slice(0,8); }
function defColor(role, idx){ return role==='leader' ? '#f0b429' : COLORS[(idx)%COLORS.length]; }
function defEmoji(role, idx){ return DEF_EMOJI[role] || EMOJIS[1 + (idx % (EMOJIS.length-1))]; }

// ── procedural event sounds: a tiny Web Audio synth behind a throttle gate, so a burst of
//    events can't stack into noise. Muted by default; the toggle persists. ──
const SoundSynth = (() => {
  let ctx = null;
  let muted = (localStorage.getItem('ct:muted') ?? '1') === '1';
  const ensure = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  };
  function beep(freq, dur, type='square', vol=.05, slide=0, delay=0) {
    if (muted) return; ensure(); if (!ctx) return;
    const t = ctx.currentTime + delay;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(.0001, t + dur);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t + dur + .02);
  }
  const last = {};
  const gate = (k, ms) => { const n = performance.now(); if (n - (last[k]||0) < ms) return false; last[k] = n; return true; };
  return {
    get muted(){ return muted; },
    toggle(){ muted = !muted; localStorage.setItem('ct:muted', muted ? '1' : '0'); if (!muted) ensure(); return muted; },
    dispatch(){ if (gate('d', 120)) beep(560, .08, 'square', .04, -220); },
    response(){ if (gate('r', 120)) { beep(440, .07, 'sine', .05); beep(660, .09, 'sine', .05, 0, .09); } },
    blocked(){ if (gate('b', 250)) beep(110, .16, 'sawtooth', .05, -30); },
    report(){ [523.25, 659.25, 783.99].forEach((f,i) => beep(f, .14, 'triangle', .05, 0, i * .11)); },
  };
})();
const sndBtn = document.getElementById('sndBtn');
function renderSnd(){ sndBtn.textContent = SoundSynth.muted ? '🔇 sound off' : '🔊 sound on'; }
sndBtn.onclick = () => { SoundSynth.toggle(); renderSnd(); };
renderSnd();

function tile(name, role) {
  if (agents[name]) return agents[name];
  const idx = Object.keys(agents).length;
  const a = { name, role, color: LS(name,'color') || defColor(role, idx),
              emoji: LS(name,'emoji') || defEmoji(role, idx),
              status:'idle', task:'', status1:'waiting', last:null, resp:'', t0:null };
  const el = document.createElement('div');
  el.className = 'tile'; el.dataset.agent = name; el.style.setProperty('--c', a.color);
  el.innerHTML = `
    <div class="tile-hd">
      <button class="emoji" title="click to change emoji">${a.emoji}</button>
      <button class="swatch" title="click to change colour"></button>
      <div class="who"><b>${name}</b><span class="role">${role}</span></div>
      <span class="st"><i></i><span class="stt">idle</span><span class="tm"></span></span>
    </div>
    <div class="pop emojipop">${EMOJIS.map(e=>`<span class="opt" data-emoji="${e}">${e}</span>`).join('')}</div>
    <div class="pop colorpop">${COLORS.map(c=>`<span class="sw" data-color="${c}" style="background:${c}"></span>`).join('')}</div>
    <div class="line task"><span class="k">task:</span> <span class="v">—</span></div>
    <div class="status1">waiting</div>
    <div class="last" hidden></div>
    <div class="resp" hidden></div>`;
  a.el = el;
  // drag to rearrange (when unlocked)
  el.draggable = false;
  el.addEventListener('dragstart', e => { dragged = el; el.classList.add('drag'); });
  el.addEventListener('dragend', () => { el.classList.remove('drag'); saveOrder(); });
  el.addEventListener('dragover', e => { e.preventDefault();
    const t = e.currentTarget; if (dragged && dragged!==t) {
      const r = t.getBoundingClientRect();
      bento.insertBefore(dragged, (e.clientY - r.top)/r.height < .5 ? t : t.nextSibling);
    } });
  // click-to-open palettes: emoji button → emoji palette · swatch → colour palette
  const emojipop = el.querySelector('.emojipop'), colorpop = el.querySelector('.colorpop');
  el.querySelector('.emoji').onclick = (e) => { e.stopPropagation(); const was = emojipop.classList.contains('open'); closeAllPops(); if (!was) emojipop.classList.add('open'); };
  el.querySelector('.swatch').onclick = (e) => { e.stopPropagation(); const was = colorpop.classList.contains('open'); closeAllPops(); if (!was) colorpop.classList.add('open'); };
  emojipop.querySelectorAll('.opt').forEach(o => o.onclick = (e) => { e.stopPropagation();
    a.emoji = o.dataset.emoji; el.querySelector('.emoji').textContent = a.emoji; setLS(name,'emoji',a.emoji); emojipop.classList.remove('open');
    syncNodeStyle(name); });
  colorpop.querySelectorAll('.sw').forEach(s => { if (s.dataset.color===a.color) s.classList.add('on');
    s.onclick = (e) => { e.stopPropagation(); a.color=s.dataset.color; el.style.setProperty('--c',a.color); setLS(name,'color',a.color);
      colorpop.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on', x===s)); colorpop.classList.remove('open');
      syncNodeStyle(name); }; });
  bento.appendChild(el);
  agents[name] = a;
  return a;
}

function render(a) {
  const el = a.el;
  el.classList.toggle('working', a.status==='working');
  el.classList.toggle('done', a.status==='done');
  el.querySelector('.stt').textContent = a.status;
  el.querySelector('.task .v').textContent = a.task || '—';
  el.querySelector('.status1').textContent = a.status1;
  const last = el.querySelector('.last');
  if (a.last) { last.hidden = false;
    last.innerHTML = `← from <b style="color:var(--c)">${a.last.from}</b> · ${a.last.when}<span class="txt"></span>`;
    last.querySelector('.txt').textContent = a.last.text; }
  const resp = el.querySelector('.resp');
  if (a.resp) { resp.hidden = false; resp.textContent = '→ ' + a.resp; }
}

function log(cls, t, html) {
  const nearBottom = railEl.scrollTop + railEl.clientHeight > railEl.scrollHeight - 80;
  const li = document.createElement('div'); li.className = 'li ' + (cls||'');
  li.innerHTML = `<span class="t">${t}</span><span class="m">${html}</span>`;
  logEl.appendChild(li);
  if (nearBottom) li.scrollIntoView({behavior:'smooth', block:'end'});   // don't yank a user who scrolled up
}

// ── the team GRAPH: leader on top, teammates fanned on a shallow arc below.
//    Edges are curved béziers; messages ride the actual path as comet pulses; each edge keeps
//    a decaying "heat" so busy routes stay visibly worn. Nodes magnify near the pointer with
//    a cosine falloff (dock physics), spin a gold ring while working, and badge green when done. ──
const NS = 'http://www.w3.org/2000/svg';
const G = { svg: document.getElementById('graph'), nodes:{}, edges:{}, pulses:[], leader:null, mouse:null };
function leaderName(){ return G.leader; }

function edgePath(a, b) {
  const mx = (a.x + b.x)/2 + (b.x - 400)*.14, my = (a.y + 26 + b.y - 28)/2 + 14;
  return `M ${a.x} ${a.y+26} Q ${mx} ${my} ${b.x} ${b.y-28}`;
}

function buildGraph(leader, members) {
  [...G.svg.querySelectorAll('.gnode,.edge,.pulse,.trail')].forEach(e => e.remove());
  G.nodes = {}; G.edges = {}; G.pulses = []; G.leader = leader;
  G.nodes[leader] = { x:400, y:64, role:'leader' };
  const n = members.length;
  members.forEach((m,i) => { const t = n===1 ? .5 : i/(n-1);
    G.nodes[m] = { x: n===1 ? 400 : 120 + 560*t, y: 224 + 22*Math.sin(Math.PI*t), role:'teammate' }; });
  members.forEach(m => {
    const p = document.createElementNS(NS,'path');
    p.setAttribute('d', edgePath(G.nodes[leader], G.nodes[m]));
    p.setAttribute('class','edge'); G.svg.appendChild(p);
    G.edges[m] = { el:p, heat:0, len:p.getTotalLength() };
  });
  const t0 = performance.now();
  Object.entries(G.nodes).forEach(([name,nd], i) => {
    const ag = agents[name] || { emoji: nd.role==='leader'?'🧭':'🤖', color: nd.role==='leader'?'#f0b429':'#6ea8fe' };
    const g = document.createElementNS(NS,'g'); g.setAttribute('class','gnode '+nd.role); g.dataset.agent=name;
    g.setAttribute('transform',`translate(${nd.x},${nd.y})`); g.style.setProperty('--c', ag.color);
    g.innerHTML = `<g class="zoom" transform="scale(0.001)">`
      + `<circle class="halo" r="32"/><circle class="ring" r="28"/><circle class="spinring" r="28"/>`
      + `<circle class="disc" r="24"/><text class="emo" y="7" text-anchor="middle">${ag.emoji}</text>`
      + `<circle class="donedot" r="4.5" cx="18" cy="-17"/></g>`
      + `<text class="nm" y="48" text-anchor="middle">${name}</text>`
      + `<text class="ro" y="62" text-anchor="middle">${nd.role.toUpperCase()}</text>`;
    g.onclick = () => focusAgent(name);
    G.svg.appendChild(g);
    nd.g = g; nd.zoom = g.querySelector('.zoom');
    nd.s = 0.001; nd.bornAt = t0 + i*80;      // staggered spring-in via the magnify lerp
  });
}

function syncNodeStyle(name) {   // emoji/colour customisation carries onto the graph node
  const nd = G.nodes[name], ag = agents[name];
  if (!nd || !nd.g || !ag) return;
  nd.g.style.setProperty('--c', ag.color);
  const emo = nd.g.querySelector('.emo'); if (emo) emo.textContent = ag.emoji;
}

G.svg.addEventListener('pointermove', e => {
  const m = G.svg.getScreenCTM(); if (!m) return;
  const pt = G.svg.createSVGPoint(); pt.x = e.clientX; pt.y = e.clientY;
  G.mouse = pt.matrixTransform(m.inverse());
});
G.svg.addEventListener('pointerleave', () => { G.mouse = null; });

const MAG_RANGE = 150, MAG_MAX = .34;
function graphTick(t) {
  for (const nd of Object.values(G.nodes)) {
    if (!nd.zoom) continue;
    let target = 1;
    if (nd.bornAt && t < nd.bornAt) target = 0.001;
    else if (G.mouse) {
      const d = Math.hypot(G.mouse.x - nd.x, G.mouse.y - nd.y);
      // cosine falloff: 1.0 at the cursor, easing to 0 at the range boundary
      if (d < MAG_RANGE) target = 1 + MAG_MAX * ((Math.cos((d / MAG_RANGE) * Math.PI) + 1) / 2);
    }
    nd.s += (target - nd.s) * .16;
    nd.zoom.setAttribute('transform', `scale(${nd.s.toFixed(3)})`);
  }
  for (const e of Object.values(G.edges)) {
    if (e.heat > .003) { e.heat *= .97; e.el.style.opacity = .38 + .62*e.heat; }
  }
  pulsesTick(t);
}

function pulseEdge(from, to) {
  const member = from === G.leader ? to : from;
  const e = G.edges[member], a = G.nodes[from], b = G.nodes[to];
  if (!e || !a || !b) return;
  e.heat = 1;
  e.el.classList.add('active'); setTimeout(() => e.el.classList.remove('active'), 1400);
  const P = { e, reverse: from !== G.leader, t0: performance.now(), dur: 1100, dots: [] };
  const p = document.createElementNS(NS,'circle'); p.setAttribute('class','pulse'); p.setAttribute('r','4.5');
  G.svg.appendChild(p); P.el = p;
  for (let i = 0; i < 5; i++) {   // the comet trail
    const d = document.createElementNS(NS,'circle'); d.setAttribute('class','trail');
    d.setAttribute('r', (3.4 - i*.55).toFixed(2)); d.style.opacity = .5 - i*.09;
    G.svg.appendChild(d); P.dots.push(d);
  }
  G.pulses.push(P);
  [a.g, b.g].forEach(g => { if (g) { g.classList.add('glow'); setTimeout(() => g.classList.remove('glow'), 1500); } });
  Frame.activity();
}
function pulsesTick(t) {
  for (let i = G.pulses.length - 1; i >= 0; i--) {
    const P = G.pulses[i], k = Math.min(1, (t - P.t0) / P.dur);
    const ease = k < .5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2)/2;
    const at = kk => P.e.el.getPointAtLength(Math.max(0, Math.min(P.e.len, (P.reverse ? 1-kk : kk) * P.e.len)));
    const pos = at(ease);
    P.el.setAttribute('cx', pos.x); P.el.setAttribute('cy', pos.y);
    P.dots.forEach((d, j) => { const q = at(Math.max(0, ease - (j+1)*.045)); d.setAttribute('cx', q.x); d.setAttribute('cy', q.y); });
    if (k >= 1) { P.el.remove(); P.dots.forEach(d => d.remove()); G.pulses.splice(i, 1); }
  }
}
function gStatus(name, working) { const nd = G.nodes[name];
  if (nd && nd.g) { nd.g.classList.toggle('working', !!working); if (working) nd.g.classList.remove('done'); } }
function gDone(name) { const nd = G.nodes[name]; if (nd && nd.g) nd.g.classList.add('done'); }
function gGlow(name) { const nd = G.nodes[name]; if (nd && nd.g) { nd.g.classList.add('glow'); setTimeout(() => nd.g.classList.remove('glow'), 1600); } }
function focusAgent(name){ const t = agents[name] && agents[name].el; if(!t) return;
  document.querySelectorAll('.tile.focus').forEach(x=>x.classList.remove('focus'));
  t.classList.add('focus'); t.scrollIntoView({behavior:'smooth', block:'center'}); setTimeout(()=>t.classList.remove('focus'), 2600); }

// ── ambient cave dust: gold embers + blue motes drifting up. The draw loop NEVER paints under
//    the blurred header, so the GPU can cache the backdrop-filter framebuffer instead of
//    re-blurring every frame. ──
const Dust = (() => {
  const cv = document.getElementById('dust'), c = cv.getContext('2d');
  let W, H;
  const HEADER_H = 57;   // the backdrop-blurred region to keep clear
  function resize() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    W = innerWidth; H = innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  addEventListener('resize', resize); resize();
  const P = [];
  for (let i = 0; i < 70; i++) P.push({
    x: Math.random()*W, y: Math.random()*H, r: .6 + Math.random()*1.7,
    vy: -(.06 + Math.random()*.22), vx: (Math.random()-.5)*.08,
    a: .12 + Math.random()*.3, gold: Math.random() < .35, ph: Math.random()*6.28 });
  function draw(t) {
    c.clearRect(0, 0, W, H);
    for (const p of P) {
      p.y += p.vy; p.x += p.vx + Math.sin(t*.0004 + p.ph)*.05;
      if (p.y < -4) { p.y = H + 4; p.x = Math.random()*W; }
      if (p.x < -4) p.x = W + 4; else if (p.x > W + 4) p.x = -4;
      if (p.y < HEADER_H + 3) continue;              // keep the blurred header cacheable
      c.globalAlpha = p.a * (.6 + .4*Math.sin(t*.001 + p.ph));
      c.fillStyle = p.gold ? '#f0b429' : '#6ea8fe';
      c.beginPath(); c.arc(p.x, p.y, p.r, 0, 6.2832); c.fill();
    }
    c.globalAlpha = 1;
  }
  return { draw };
})();

function applyOrder() {
  order.forEach(n => { if (agents[n]) bento.appendChild(agents[n].el); });
}
function saveOrder() {
  order = [...bento.children].map(t => t.dataset.agent);
  localStorage.setItem('ct:order', JSON.stringify(order));
}

let unlocked = false, dragged = null;
function toggleLock() {
  unlocked = !unlocked;
  document.body.classList.toggle('unlocked', unlocked);
  Object.values(agents).forEach(a => a.el.draggable = unlocked);
  document.getElementById('lockBtn').textContent = unlocked ? '🔓 unlocked — drag to rearrange' : '🔒 locked';
  document.getElementById('hint').textContent = unlocked
    ? 'drag tiles to rearrange · click the emoji + a colour to customise each agent'
    : 'a tile per agent — its task, status, last message in, and latest response';
}

function handle(ev) {
  const d = ev.data || ev;
  if (!runT0) runT0 = performance.now();
  Frame.activity();
  if (ev.kind === 'team') {
    taskEl.textContent = d.task ? '— ' + d.task : '';
    tile(d.leader, 'leader'); const L = agents[d.leader]; L.task = d.task || ''; L.status1 = 'orchestrating'; render(L);
    (d.members || []).forEach(m => tile(m, 'teammate'));
    applyOrder();
    buildGraph(d.leader, d.members || []);
  } else if (ev.kind === 'dispatch') {
    const a = tile(d.to, 'teammate');
    a.status = 'working'; a.task = d.prompt || a.task; a.t0 = performance.now();
    a.status1 = d.one_liner_to_show_user || ('working — ' + (d.prompt || '').slice(0,60));
    a.last = { from:'leader', when:now(), text:d.prompt || ('read ' + (d.path||'')) };
    render(a);
    pulseEdge(leaderName(), d.to); gStatus(d.to, true);
    SoundSynth.dispatch();
    log('', now(), `<b>leader</b> → <b style="color:var(--c)">${d.to}</b>`);
  } else if (ev.kind === 'blocked') {
    const L = Object.values(agents).find(a=>a.role==='leader'); if (L) { L.el.classList.remove('flash'); void L.el.offsetWidth; L.el.classList.add('flash'); L.status1='corrected a wrong message'; render(L); }
    gGlow(leaderName());
    SoundSynth.blocked();
    log('warn', now(), `⚠ guardrail blocked the leader — ${(d.error||'').slice(0,70)}`);
  } else if (ev.kind === 'response') {
    const a = tile(d.frm, 'teammate');
    a.status = 'done'; a.status1 = d.one_liner_to_show_user || 'responded'; a.resp = d.text || ''; a.t0 = null; render(a);
    pulseEdge(d.frm, leaderName()); gStatus(d.frm, false); gDone(d.frm);
    SoundSynth.response();
    log('', now(), `<span class="g">${d.frm}</span> → leader ✓`);
  } else if (ev.kind === 'report') {
    statusEl.className = 'done'; statusText.textContent = 'done'; runDone = true;
    document.body.classList.add('celebrate');
    const L = Object.values(agents).find(a=>a.role==='leader'); if (L) { L.status='done'; L.status1='run complete — report ready'; render(L); }
    if (d.text) { reportText.textContent = d.text; reportCard.hidden = false; }
    SoundSynth.report();
    log('report', now(), `✓ team report ready`);
  }
}

// ── one frame governor drives everything (dust, graph, timers). It idles to 1/3 rate when the
//    run has been quiet for a while, and rAF itself stops in hidden tabs. ──
const Frame = (() => {
  let lastEvent = performance.now(), frame = 0;
  let tickAcc = 0;
  function busy() {
    return performance.now() - lastEvent < 6000 || G.pulses.length > 0
      || Object.values(agents).some(a => a.status === 'working');
  }
  function timersTick() {
    if (++tickAcc < 20) return; tickAcc = 0;
    for (const a of Object.values(agents)) {
      if (a.status === 'working' && a.t0) {
        const s = Math.floor((performance.now() - a.t0) / 1000);
        a.el.querySelector('.tm').textContent = ` ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
      }
    }
    if (runT0 && !runDone) {
      const s = Math.floor((performance.now() - runT0) / 1000);
      clockEl.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    }
  }
  function loop(t) {
    frame++;
    if (busy() || frame % 3 === 0) { Dust.draw(t); graphTick(t); }
    timersTick();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  return { activity(){ lastEvent = performance.now(); } };
})();

// LIVE via the cave server's SSE, or DEMO from an embedded run (for capture / standalone view).
const DEMO = [
  {kind:'team', data:{leader:'leader', members:['researcher','writer'], task:'Why are octopuses considered intelligent?'}},
  {kind:'dispatch', data:{to:'researcher', prompt:'read the task and give 3 key facts', path:'sessions/s1/task.txt', one_liner_to_show_user:'Researching octopus intelligence — gathering 3 key facts'}},
  {kind:'response', data:{frm:'researcher', text:'• distributed nervous system (9 brains)\n• tool use & problem-solving (jars, mazes)\n• camouflage requires real-time scene modeling', one_liner_to_show_user:'Found 3 facts: 9-brain system, tool use, real-time camouflage'}},
  {kind:'blocked', data:{error:"It isn't researcher's turn — these can run now: ['writer']. Message one of them."}},
  {kind:'dispatch', data:{to:'writer', prompt:'read the research and write one tight sentence', path:'sessions/s1/artifacts/researcher-response.txt', one_liner_to_show_user:'Writing the final one-sentence summary from the research'}},
  {kind:'response', data:{frm:'writer', text:'Octopuses are intelligent because a distributed nine-brain nervous system lets them solve problems, use tools, and model their surroundings in real time to camouflage.', one_liner_to_show_user:'Wrote the final summary sentence'}},
  {kind:'report', data:{text:'researcher gathered the facts; the leader caught itself re-dispatching researcher and corrected to the writer; the writer produced the final sentence.'}},
];

function runDemo(seq, i=0) {
  if (i >= seq.length) { statusEl.className='done'; statusText.textContent='done'; return; }
  handle(seq[i]);
  setTimeout(() => runDemo(seq, i+1), seq[i].kind === 'response' ? 1000 : 700);
}

window.CT = { G, agents, handle };   // debug/inspection handle (used by capture + live poking)

const params = new URLSearchParams(location.search);
if (params.get('live') !== null) {
  try {
    const es = new EventSource('/team/events');
    es.onmessage = (m) => { try { handle(JSON.parse(m.data)); } catch (e) {} };
    es.onerror = () => { statusText.textContent = 'disconnected'; };
  } catch (e) { statusText.textContent = 'no stream'; runDemo(DEMO); }
} else {
  statusText.textContent = 'replay';
  runDemo(DEMO);
}
</script>
