[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "cave-teams"
version = "0.1.0"
description = "Connect AI agents like code — compose any agents into teams with a tiny algebra, all topologies, a programmable message state machine, and a proven-team library. CAVE = Coding Agent Virtualization Environment."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "sancovp" }]
keywords = ["agents", "multi-agent", "agent-teams", "orchestration", "claude-code", "dsl", "cave", "provider-agnostic"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Intended Audience :: Developers",
]
# Core is ZERO-dependency — the chain ontology is vendored.
dependencies = []

[project.optional-dependencies]
# The bare MiniMax / Anthropic-compatible backend needs the anthropic client.
# (The heaven backend, for real coding agents with tools, is provided by its environment.)
minimax = ["anthropic>=0.40"]

[project.urls]
Homepage = "https://github.com/sancovp/cave-teams"
Repository = "https://github.com/sancovp/cave-teams"

[tool.setuptools.packages.find]
include = ["cave_teams*"]
